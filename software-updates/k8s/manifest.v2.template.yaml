apiVersion: batch/v1
kind: Job
metadata:
  name: python-hello-user
  namespace: ${NAMESPACE}
spec:
  template:
    metadata:
      labels:
        app: python-hello-user
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ${IMAGE_PULL_SECRET_NAME}
      containers:
        - name: python-hello-user
          image: ${IMAGE_NAME_V2}
          imagePullPolicy: Always
          env:
            - name: API_USER
              value: ${API_USER}
            - name: API_PASSWORD
              value: ${API_PASSWORD}
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "760Mi"
              cpu: "500m"
